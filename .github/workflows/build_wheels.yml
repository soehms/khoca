name: Reusable workflow for cibuildwheel

on:
  workflow_call:
    inputs:
      operating-systems:
        default: >-
          ["ubuntu-latest"]
        type: string
      before-all:
        default: yum -q update && yum -q -y install gmp-devel && sh .install-pari.sh
        type: string
      environment:
        default: CC=g++
        type: string

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.operating-systems) }}

    steps:
      - uses: actions/checkout@v4

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.22.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BEFORE_ALL: ${{ inputs.before-all }}
          CIBW_ENVIRONMENT: ${{ inputs.environment }}

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
